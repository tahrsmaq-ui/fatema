<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>من عبود إلى دكتورتي فاتن</title>
    <style>
        body { margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #fce4ec, #f8bbd0); font-family: 'Segoe UI', sans-serif; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; }
        .btn { background: #d81b60; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-size: 1rem; margin: 10px; cursor: pointer; }
        #page2, #page3 { display: none; }
    </style>
</head>
<body>

<div class="card" id="card">
    <!-- الشاشة 1: النص -->
    <div id="page1">
        <p style="font-size: 1.2rem; line-height: 1.6;">
            هنا تضع نصك الطويل جداً الذي تريدها أن تقرأه... (ضع نصك هنا)
        </p>
        <button class="btn" id="go-to-question">اضغطي هنا للمفاجأة</button>
    </div>

    <!-- الشاشة 2: السؤال -->
    <div id="page2">
        <h2 style="color: #d81b60;">هل تصبحين حبيبتي؟</h2>
        <button class="btn" id="yes-btn">نعم</button>
        <button class="btn" id="no-btn">لا</button>
    </div>

    <!-- الشاشة 3: النتيجة -->
    <div id="page3">
        <div id="result-content" style="font-size: 80px;"></div>
    </div>
</div>

<script>
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const page3 = document.getElementById('page3');
    const result = document.getElementById('result-content');

    // الانتقال من النص للسؤال
    document.getElementById('go-to-question').addEventListener('click', () => {
        page1.style.display = 'none';
        page2.style.display = 'block';
    });

    // عند الضغط على نعم
    document.getElementById('yes-btn').addEventListener('click', () => {
        page2.style.display = 'none';
        page3.style.display = 'block';
        result.innerHTML = '❤️<h1 style="color: #d81b60;">أحبك!</h1>';
    });

    // عند الضغط على لا
    document.getElementById('no-btn').addEventListener('click', () => {
        alert("شكراً");
    });
</script>

</body>
</html>
