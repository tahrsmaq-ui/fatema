<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>من عبود إلى دكتورتي فاتن</title>
    <style>
        body { margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #fce4ec, #f8bbd0); font-family: 'Segoe UI', sans-serif; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        .btn { background: #d81b60; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-size: 1rem; margin: 10px; cursor: pointer; transition: 0.3s; }
        #hidden-content { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card" id="card">
    <button class="btn" id="reveal-btn">اضغطي هنا للمفاجأة</button>

    <div id="hidden-content">
        <p style="font-size: 1.2rem; line-height: 1.6; color: #555;">
            (ضع نصك الطويل هنا)
        </p>
        <h2 style="color: #d81b60;">هل تصبحين حبيبتي؟</h2>
        <button class="btn" id="yes-btn">نعم</button>
        <button class="btn" id="no-btn">لا</button>
    </div>
</div>

<script>
    const revealBtn = document.getElementById('reveal-btn');
    const hiddenContent = document.getElementById('hidden-content');
    const yesBtn = document.getElementById('yes-btn');
    const noBtn = document.getElementById('no-btn');
    const card = document.getElementById('card');

    revealBtn.addEventListener('click', () => {
        revealBtn.style.display = 'none';
        hiddenContent.style.display = 'block';
    });

    noBtn.addEventListener('mouseover', () => {
        noBtn.style.position = 'fixed';
        noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        noBtn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
    });

    yesBtn.addEventListener('click', () => {
        card.innerHTML = <div style="font-size: 80px;">❤️</div><h1 style="color: #d81b60;">أحبك!</h1>;
    });
</script>

</body>
</html>
