<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مفاجأة</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #fce4ec, #f8bbd0); font-family: sans-serif; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 500px; width: 90%; }
        .btn { background: #d81b60; color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 18px; margin: 10px; }
        #hidden-part { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <button class="btn" id="btn-reveal">اضغطي هنا للمفاجأة</button>

    <div id="hidden-part">
        <p style="font-size: 1.2rem; text-align: right; color: #333;">
            هنا تضع نصك الطويل الذي تريده أن يظهر...
        </p>
        <h2 style="color: #d81b60;">هل تصبحين حبيبتي؟</h2>
        <button class="btn" id="yes-btn">نعم</button>
        <button class="btn" id="no-btn">لا</button>
    </div>
</div>

<script>
    const btnReveal = document.getElementById('btn-reveal');
    const hiddenPart = document.getElementById('hidden-part');
    const yesBtn = document.getElementById('yes-btn');
    const noBtn = document.getElementById('no-btn');
    const mainCard = document.getElementById('main-card');

    // إظهار النص عند الضغط
    btnReveal.addEventListener('click', () => {
        btnReveal.style.display = 'none';
        hiddenPart.style.display = 'block';
    });

    // هروب زر لا
    noBtn.addEventListener('mouseover', () => {
        noBtn.style.position = 'fixed';
        noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        noBtn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
    });

    // عند الضغط على نعم
    yesBtn.addEventListener('click', () => {
        mainCard.innerHTML = '<h1 style="color: #d81b60;">أحبك! ❤️</h1>';
    });
</script>

</body>
</html>
